# .golangci.yml — vProx linter configuration
# Phase 5 CI/CD Maturity: pragmatic set, no false-positive noise

run:
  timeout: 5m
  modules-download-mode: readonly
  go: ""  # read from go.mod

linters:
  enable:
    # Default-equivalent
    - govet
    - staticcheck
    - errcheck
    - gosimple
    - ineffassign
    - unused
    # Security
    - gosec
    # Formatting
    - gofmt
    - goimports
    # Code quality
    - misspell
    - bodyclose
    - noctx
    - exhaustive

linters-settings:
  gosec:
    severity: medium
    confidence: medium
    excludes: []
  exhaustive:
    default-signifies-exhaustive: true
  errcheck:
    check-type-assertions: false
    check-blank: false
  govet:
    enable-all: false
  misspell:
    locale: US
  goimports:
    local-prefixes: github.com/vNodesV/vProx

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  new-from-rev: ""  # lint all code locally; CI overrides via action config

  exclude-rules:
    # G304: file inclusion via variable — intentional in geo loader and backup
    - path: internal/geo/geo\.go
      linters: [gosec]
      text: "G304"
    - path: internal/backup/backup\.go
      linters: [gosec]
      text: "G304"

    # G304 + G306: config loaders read user-specified paths by design
    - path: internal/config/
      linters: [gosec]
      text: "G304"
    - path: internal/config/
      linters: [gosec]
      text: "G306"

    # G304: vlog config loader
    - path: internal/vlog/config/
      linters: [gosec]
      text: "G304"

    # Don't enforce errcheck on test files (test helpers, deferred closes)
    - path: _test\.go
      linters: [errcheck]

    # Test files: relax gosec G306 (file perms), noctx, and bodyclose
    - path: _test\.go
      linters: [gosec]
      text: "G306"
    - path: _test\.go
      linters: [noctx]
    - path: _test\.go
      linters: [bodyclose]

    # Exclude vendor directory
    - path: vendor/
      linters: [ALL]
