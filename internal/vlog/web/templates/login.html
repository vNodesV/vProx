<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>vLog — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #e0e0e0;
      overflow: hidden;
    }

    /* Hero background */
    .bg-hero {
      position: fixed;
      inset: 0;
      background: url('{{.BasePath}}/static/bg_wide.png') center/cover no-repeat;
      z-index: 0;
    }
    .bg-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      z-index: 1;
    }

    /* Glass card */
    .login-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      margin: 1rem;
      padding: 2.5rem 2rem 2rem;
      background: rgba(18, 24, 18, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(76, 175, 80, 0.25);
      border-radius: 16px;
      box-shadow:
        0 0 40px rgba(76, 175, 80, 0.08),
        0 8px 32px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    /* Logo */
    .logo {
      height: 80px;
      margin-bottom: 1rem;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; filter: brightness(1); }
      50% { opacity: 0.85; filter: brightness(1.15); }
    }

    /* Title */
    .login-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.25rem;
      letter-spacing: 0.02em;
    }
    .login-subtitle {
      font-size: 0.85rem;
      font-weight: 500;
      color: rgba(76, 175, 80, 0.8);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 1.75rem;
    }

    /* Error message */
    .login-error {
      background: rgba(244, 67, 54, 0.12);
      border: 1px solid rgba(244, 67, 54, 0.35);
      color: #ef5350;
      font-size: 0.85rem;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.25rem;
    }

    /* Form */
    .login-form { display: flex; flex-direction: column; gap: 1rem; }

    .input-group { position: relative; text-align: left; }
    .input-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }
    .input-group input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-group input::placeholder { color: rgba(255, 255, 255, 0.25); }
    .input-group input:focus {
      border-color: #4caf50;
      box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.5);
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.5rem;
      background: #4caf50;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      letter-spacing: 0.02em;
    }
    .btn-submit:hover {
      background: #3e8e41;
      box-shadow: 0 0 16px rgba(76, 175, 80, 0.3);
    }
    .btn-submit:active {
      background: #357a38;
    }

    /* Footer */
    .login-footer {
      margin-top: 1.75rem;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 0.04em;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card {
        padding: 2rem 1.25rem 1.5rem;
        border-radius: 12px;
      }
      .logo { height: 60px; }
      .login-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="bg-hero"></div>
  <div class="bg-overlay"></div>

  <div class="login-card">
    <img src="{{.BasePath}}/static/2025_NOBG.png" alt="vNodes[V]" class="logo">
    <div class="login-title">vLog</div>
    <div class="login-subtitle">Access Restricted</div>

    {{if eq .Error "invalid"}}
    <div class="login-error">Invalid credentials — please try again.</div>
    {{end}}

    <form method="POST" action="{{.BasePath}}/login" class="login-form" autocomplete="on">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="admin" required autofocus autocomplete="username">
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <div class="login-footer">&copy; vNodes[V]</div>
  </div>
</body>
</html>
