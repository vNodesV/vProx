# Akash Network chain configuration
# Loaded by scripts via: load_chain_config "$CHAIN_DIR/chain.toml"
# Override any value with env vars: CHAIN_VERSION, CHAIN_MONIKER, CHAIN_HOME, CHAIN_USER

chain_id = "akashnet-2"
binary   = "akash"
version  = "v0.36.0"
moniker  = ""          # override with CHAIN_MONIKER or --moniker flag

[network]
genesis_url = "https://raw.githubusercontent.com/akash-network/net/main/mainnet/genesis.json"
seeds       = "27eb432ccd5e895c5c659659120d68b393dd8c60@135.181.113.227:26656,9180b99a5be3443677e0f57fc5f40e8f071bdcd8@161.97.149.7:26656"
peers       = ""
min_gas     = "0.025uakt"

[node]
home = "/home/akash/.akash"
user = "akash"

[ports]
rpc  = "26657"
p2p  = "26656"
grpc = "9090"
api  = "1317"
