# vms.toml — push VM registry
#
# One [[vm]] block per chain VM. vm.name IS the chain name.
# type = validator | sp | relayer
#
# rpc_url / rest_url are optional — defaults to http://host:26657 and http://host:1317.
# Only set them if using non-standard ports.
#
# Generate the push key:
#   ssh-keygen -t ed25519 -C "vprox-push" -f /etc/vprox/push/id.push
# Authorize it on target VMs:
#   ssh-copy-id -i /etc/vprox/push/id.push.pub user@host

[[vm]]
name       = "akash"
host       = "10.0.0.68"
port       = 22
user       = "jarvis"
key_path   = "/etc/vprox/push/id.push"
datacenter = "QC"
type       = "validator"
explorer   = "ping.pub"   # block explorer base hostname
chain_id   = "akashnet-2" # official chain-id (e.g. akashnet-2, cheqd-mainnet-1)
# rpc_url  = "http://10.0.0.68:36657"   # only needed for non-standard ports
# rest_url = "http://10.0.0.68:2317"

