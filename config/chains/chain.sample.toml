# vProx Chain Configuration Sample
# rev: {{SAMPLE_REV}}
# Copy this file and customize for each chain you want to proxy
# Place chain configs in: $VPROX_HOME/config/chains/

# Schema version for forward compatibility. Do not change unless instructed by an upgrade guide.
schema_version = 1

chain_name     = "your_chain"
host           = "api-link.example.com"
ip             = "127.0.0.1"

# Official chain-id (e.g. "cheqd-mainnet-1"). Used by vLog dashboard for explorer links.
chain_id       = ""

# Block explorer base URL. Leave empty to disable explorer links on the dashboard.
# Examples: "ping.pub", "testnets.ping.pub", "https://testnet-explorer.cheqd.io"
explorer_base  = ""

default_ports  = false
msg_rpc        = false   # enable rpc_msg banner on RPC index
msg_api        = false   # enable api_msg banner on REST/swagger

# Alias hostnames — only routed when expose.vhost = true
rpc_aliases    = []      # e.g. ["rpc-alt.example.com"]
rest_aliases   = []      # e.g. ["rest-alt.example.com"]
api_aliases    = []      # e.g. ["api-alt.example.com"]

[message]
# Printed only when msg_rpc / msg_api are true (respectively).
# Leave empty or omit to skip — features below work independently.
    api_msg = ""
    rpc_msg = ""

[expose]
    path  = true        # Enable /rpc, /rest, /websocket on base host
    vhost = true        # Enable api.<host>, rpc.<host> subdomains

[expose.vhost_prefix]
    rpc  = "rpc"
    rest = "api"

[services]
    rpc        = true
    rest       = true
    websocket  = true
    grpc       = true
    grpc_web   = true
    api_alias  = true   # /api -> REST (port 1317)

# [ports] is only required when default_ports = false.
# Default values are managed in config/ports.toml.
# Uncomment and set custom ports if this chain differs from defaults.
# [ports]
#     rpc      = 26657
#     rest     = 1317
#     grpc     = 9090
#     grpc_web = 9091
#     api      = 1317

[ws]
    idle_timeout_sec = 3600      # WebSocket idle timeout (default: 3600)
    max_lifetime_sec = 0         # WebSocket max lifetime, 0 = unlimited

[features]
    rpc_address_masking = true   # Mask local IP links (10.0.0.x/) on RPC index HTML
    mask_rpc            = ""     # Replacement label for masked IP (empty = remove entirely)
    swagger_masking     = false  # Rewrite Swagger Try-It base URL to public host
    absolute_links      = "auto" # auto | always | never

[logging]
    file   = "your_chain.log"       # Per-chain log file (logs in data/logs/)
    format = "summary"              # summary | json | raw

# ── Management (v1.3.0) ────────────────────────────────────────────────────────
# Embeds server/VM management directly in chain.toml.
# When managed_host = true, this replaces the [[vm]] entry in config/push/vms.toml.
#
# Global SSH defaults (user, key_path) are read from [vlog.push.defaults] in vlog.toml
# and applied when the fields below are left empty ("").
#
# Note: fields left at their default values are described in the comments.
[management]
# Set to true to enable push module management for this chain's node.
managed_host     = false

# LAN / SSH target IP of the node. Defaults to chain.ip when empty.
lan_ip           = ""

# Public IP (display-only, shown in the Server Status block). Optional.
public_ip        = ""

# SSH user. Empty = fall back to [vlog.push.defaults].user.
user             = ""

# Path to the SSH private key. Empty = fall back to [vlog.push.defaults].key_path.
key_path         = ""

# SSH port. 0 = default (22).
port             = 0

# Service role(s) for this node. Used for dashboard badges.
# Values: "validator", "sp", "rpc", "relayer", "node" (list multiple roles)
type             = ["validator"]

# Validator operator address (bech32 cosmosvaloper…) for governance participation tracking.
# When set, the Chain Services block shows voted/total proposals for this validator.
# Leave empty for non-validator nodes.
valoper          = ""

# Datacenter / location label shown on the dashboard (e.g. "QC", "RBX", "AMS").
datacenter       = ""

# When true, vLog probes this node via the public chain.host domain (through vProx).
# Set false if vLog is on the same LAN as the node and should probe via lan_ip directly.
exposed_services = true

[management.ping]
# ISO 3166-1 alpha-2 country code of the datacenter's country.
# Used by the Server Status block to probe via check-host.net from a regional node.
# Supported values: CA  US  FR  DE  NL  GB  FI  JP  SG  BR  IN
country  = ""
# (optional) Pin to a specific check-host.net node, e.g. "ca1", "fi1".
# Leave empty to select randomly from the country's available nodes.
provider = ""
