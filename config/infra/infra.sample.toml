# infra/infra.sample.toml — per-datacenter physical host + VMs
# rev: {{SAMPLE_REV}}
#
# Create ONE file per physical server (e.g. qc.toml, rbx.toml, fra.toml).
# The [host] section defines the physical hypervisor; [[vm]] entries are the VMs on it.
# VMs automatically inherit host_ref from [host].name when host_ref is omitted.
#
# The vLog INFRASTRUCTURE block renders a collapsible tree:
#   ▶ homelab-qc  QC  LAN 10.0.0.1  2/3 online
#       akash       ONLINE  10.0.0.68  CPU: 12%  ...
#       meme-val1   ONLINE  10.0.0.69  CPU: 8%   ...
#       meme-val2   OFFLINE —
#
# Multiple datacenters: create qc.toml, rbx.toml, fra.toml, etc.
# Standalone VPS (no physical host): use [[vps]] at the bottom of this file.
# The [vprox] section registers the vProx agent credentials for SSH dispatch.


[host]
name       = "homelab-qc"          # unique name — VMs in this file inherit this as host_ref
lan_ip     = "10.0.0.1"            # physical host LAN / management IP
datacenter = "QC"                  # short location label shown on the dashboard (e.g. QC, RBX, AMS)
enable     = true                  # when false, the host + all its VMs are hidden from the dashboard tree
# public_ip = "1.2.3.4"           # display-only; omit for hosts behind vProx/Apache.


[[vm]]
name       = "akash"
# host_ref = "homelab-qc"         # auto-inferred from [host].name above; override only if needed
host       = "10.0.0.68"          # SSH target — the VM's IP or hostname
lan_ip     = "10.0.0.68"          # LAN IP shown in Servers / VM block
port       = 22
user       = "jarvis"
key_path   = "$HOME/.ssh/id_push" # PRIVATE key ($HOME expanded). Never use .pub file.
datacenter = "QC"
type       = "validator"          # validator | sp | relayer | node (comma-separated for multi-role)

[vm.ping]
# country: ISO 3166-1 alpha-2 code for the check-host.net probe node.
# Supported: CA  US  FR  DE  NL  GB  FI  JP  SG  BR  IN
country  = "CA"
# provider: pin to a specific check-host.net node (e.g. "ca1"). Leave empty to pick randomly.
provider = ""


# [[vm]]
# name       = "meme-val1"
# host       = "10.0.0.69"
# lan_ip     = "10.0.0.69"
# port       = 22
# user       = "jarvis"
# key_path   = "$HOME/.ssh/id_push"
# datacenter = "QC"
# type       = "validator"
#
# [vm.ping]
# country  = "CA"
# provider = ""


# ── vProx Agent ───────────────────────────────────────────────────────────────
# Registers the vProx machine for SSH dispatch.
# Key uses $VPROX_KEY env var (default: $HOME/.vProx/secret).
# Generate with: ssh-keygen -t ed25519 -C "vprox.agent@<lan_ip>" -f $VPROX_KEY/id.agent
# Then add the generated .pub key to each VM/VPS authorized_keys.

[vprox]
name   = "vProx"
lan_ip = "10.0.0.65"              # LAN IP of the vProx machine itself
key    = "$VPROX_KEY/id.agent"    # private key for outbound SSH dispatch


# ── VPS entries ───────────────────────────────────────────────────────────────
# For externally-hosted VPS nodes with no physical host parent.
# Remove the leading '#' to enable.

# [[vps]]
# name     = "my-vps"
# ip_addr  = "1.2.3.4"           # public IP (use ip_addr OR hostname, not both)
# hostname = ""                  # public hostname; leave empty if using ip_addr
# user     = "ubuntu"
# key      = "$HOME/.ssh/id_push" # private key; empty = use [vprox].key
# datacenter = "RBX"             # optional location label
#
# [vps.ping]
# country  = "FR"
# provider = ""
